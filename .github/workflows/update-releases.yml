name: Sync Repo Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch and Sync All Data
        env:
          GITHUB_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          python - <<EOF
          import urllib.request
          import urllib.error
          import json
          import os
          import time
          import re
          from datetime import datetime

          # 1. Configuration - Unified List
          standard_projects = {
              "3GPP RAN and Core Platforms": ["5G-MAG/rt-5g-core", "5G-MAG/rt-5g-ran-gnb", "5G-MAG/rt-5g-ran-cu", "5G-MAG/rt-5g-ran-du"],
              "5G Media Streaming": ["5G-MAG/rt-5gms-application-provider", "5G-MAG/rt-5gms-application", "5G-MAG/rt-5gms-application-function", "5G-MAG/rt-5gms-application-server", "5G-MAG/rt-5gms-media-stream-handler", "5G-MAG/rt-5gms-media-session-handler", "5G-MAG/rt-5gms-common-android-library", "5G-MAG/rt-5gms-examples"],
              "5G Core Service Consumers": ["5G-MAG/rt-5gc-service-consumers"],
              "UE Data Collection": ["5G-MAG/rt-data-collection-application-function"],
              "5G Broadcast TV Radio": ["5G-MAG/rt-mbms-tx-for-qrd-and-crd", "5G-MAG/rt-mbms-tx", "5G-MAG/rt-mbms-mw-android", "5G-MAG/rt-mbms-mw", "5G-MAG/rt-mbms-modem", "5G-MAG/rt-mbms-wui", "5G-MAG/rt-mbms-examples"],
              "XR Media": ["5G-MAG/rt-xr-unity-player", "5G-MAG/rt-xr-content", "5G-MAG/rt-xr-blender-exporter", "5G-MAG/rt-xr-glTFast", "5G-MAG/rt-xr-maf-native"],
              "V3C Immersive": ["5G-MAG/rt-v3c-unity-player", "5G-MAG/rt-v3c-decoder-plugin", "5G-MAG/rt-v3c-content"],
              "Beyond 2D": ["5G-MAG/rt-beyond2d-evaluation-framework"],
              "AI ML": ["5G-MAG/rt-ai-ml-evaluation-framework"],
              "Multimedia Protocols": ["5G-MAG/rt-libflute", "5G-MAG/rt-mbms-mw"],
              "Auxiliary Tools": ["5G-MAG/rt-common-shared"],
              "Conversational Avatar": ["5G-MAG/rt-avatar-content", "5G-MAG/rt-avatar-call", "5G-MAG/rt-avatar-unity-tracker", "5G-MAG/rt-3gpp-swap"],
              "6G Testbed": ["5G-MAG/6G-Testbed"],
              "DVB-I over 5G": ["5G-MAG/rt-5gms-application"],
              "Network Capability Exposure": ["5G-MAG/rt-network-api"]
          }

          filtered_projects = {
              "5G Broadcast Emergency Alerts": {"repos": ["5G-MAG/rt-mbms-tx-for-qrd-and-crd"], "filter": "-ea-"},
              "5G Multicast Broadcast": {"repos": ["5G-MAG/rt-mbs-function","5G-MAG/rt-mbs-transport-function", "5G-MAG/open5gs", "5G-MAG/rt-srsRAN_Project", "5G-MAG/srsRAN_4G", "5G-MAG/rt-mbs-examples"], "filter": "5mbs"}
          }

          def get_json(url):
              token = os.environ.get("GITHUB_TOKEN")
              req = urllib.request.Request(url)
              req.add_header('User-Agent', 'Github-Action-Bot')
              req.add_header('Accept', 'application/vnd.github+json')
              if token: req.add_header('Authorization', f'Bearer {token}')
              try:
                  time.sleep(0.7) # Slight delay to avoid rate limiting
                  with urllib.request.urlopen(req) as response:
                      return json.loads(response.read().decode())
              except Exception as e:
                  print(f"Error fetching {url}: {e}")
                  return None

          # Historical persistence for stats
          existing_comm_data = {}
          if os.path.exists('_data/community_stats.json'):
              try:
                  with open('_data/community_stats.json', 'r') as f:
                      old_data = json.load(f)
                      for group in old_data.get("projects", {}).values():
                          for item in group: existing_comm_data[item['name']] = item
              except: pass

          rel_out, pr_out, comm_out, repo_descriptions = {}, {}, {}, {}
          all_groups = list(standard_projects.items()) + [(k, v['repos']) for k, v in filtered_projects.items()]

          for p_name, repos in all_groups:
              rel_list, pull_list, comm_list = [], [], []
              for repo in repos:
                  repo_data = get_json(f"https://api.github.com/repos/{repo}")
                  if not repo_data: continue
                  repo_name = repo.split('/')[-1]
                  
                  # 1. Metadata descriptions
                  if repo_name not in repo_descriptions:
                      repo_descriptions[repo_name] = repo_data.get('description', '')

                  # 2. Traffic Stats
                  v_api = get_json(f"https://api.github.com/repos/{repo}/traffic/views")
                  c_api = get_json(f"https://api.github.com/repos/{repo}/traffic/clones")
                  c_v_14 = v_api.get('count', 0) if v_api else 0
                  c_c_14 = c_api.get('count', 0) if c_api else 0
                  
                  prev = existing_comm_data.get(repo_name, {})
                  # Daily increments if available
                  d_v = v_api.get('views', [])[-1].get('count', 0) if (v_api and v_api.get('views')) else 0
                  d_c = c_api.get('clones', [])[-1].get('count', 0) if (c_api and c_api.get('clones')) else 0
                  
                  final_v_total = max(c_v_14, prev.get('total_views', 0) + d_v)
                  final_c_total = max(c_c_14, prev.get('total_clones', 0) + d_c)

                  last_push = repo_data.get('pushed_at', '').split('T')[0]
                  days_pushed = (datetime.now() - datetime.strptime(last_push, "%Y-%m-%d")).days
                  status = "Active" if days_pushed <= 30 else "Maintenance" if days_pushed <= 90 else "Stable"

                  comm_list.append({
                      "name": repo_name, "stars": repo_data.get('stargazers_count', 0),
                      "forks": repo_data.get('forks_count', 0), "issues": repo_data.get('open_issues_count', 0),
                      "views_14d": c_v_14, "clones_14d": c_c_14, "total_views": final_v_total,
                      "total_clones": final_c_total, "status": status, "repo_url": f"https://github.com/{repo}"
                  })

                  # 3. Releases with Blink Logic
                  all_rels = get_json(f"https://api.github.com/repos/{repo}/releases") or []
                  f_tag = (filtered_projects[p_name]['filter'].lower() if p_name in filtered_projects else "")
                  
                  target = next((r for r in all_rels if f_tag in r.get('tag_name', '').lower()), None) if f_tag else next((r for r in all_rels if not r.get('prerelease')), None) or (all_rels[0] if all_rels else None)
                  
                  rel_date = target.get('published_at', '').split('T')[0] if target else "-"
                  rel_blink = False
                  if rel_date != "-":
                      rel_days = (datetime.now() - datetime.strptime(rel_date, "%Y-%m-%d")).days
                      if rel_days <= 30: rel_blink = True

                  rel_list.append({
                      "short_name": repo_name, "tag": target.get('tag_name') if target else "No Release",
                      "date": rel_date, "blink": rel_blink, "url": target.get('html_url') if target else f"https://github.com/{repo}/releases",
                      "repo_url": f"https://github.com/{repo}"
                  })

                  # 4. Pull Requests
                  prs = get_json(f"https://api.github.com/repos/{repo}/pulls?state=open") or []
                  for pr in prs:
                      created_date = pr.get('created_at', '').split('T')[0]
                      days_ago = (datetime.now() - datetime.strptime(created_date, "%Y-%m-%d")).days
                      color = "green" if days_ago <= 60 else "orange" if days_ago <= 120 else "red"
                      pull_list.append({
                          "repo": repo_name, "title": pr.get('title'), "url": pr.get('html_url'),
                          "user": pr.get('user', {}).get('login'),
                          "date": created_date, "days_ago": days_ago, "color": color, "blink": (days_ago <= 30)
                      })

              rel_out[p_name], pr_out[p_name], comm_out[p_name] = rel_list, pull_list, comm_list

          # 5. Output
          if not os.path.exists('_data'): os.makedirs('_data')
          ts = datetime.now().strftime("%Y-%m-%d %H:%M")
          for name, data in [('releases', rel_out), ('pull_requests', pr_out), ('community_stats', comm_out)]:
              with open(f'_data/{name}.json', 'w') as f:
                  json.dump({"last_updated": ts, "projects": data}, f, indent=2)

          # 6. YAML Sync
          yaml_path = '_data/repo_metadata.yml'
          if os.path.exists(yaml_path):
              with open(yaml_path, 'r') as f: lines = f.readlines()
              updated_lines, active_slug, skip_mode = [], None, False
              for line in lines:
                  if skip_mode:
                      if line.strip() == "" or line.startswith("      "):
                          if ":" not in line.strip() or line.strip().startswith("-"): continue
                      skip_mode = False
                  if 'repo_slug:' in line:
                      match = re.search(r'repo_slug:\s*["\']?([^"\s\n\']+)["\']?', line)
                      if match: active_slug = match.group(1)
                  if 'description:' in line:
                      raw_text = repo_descriptions.get(active_slug)
                      if raw_text:
                          clean_text = raw_text.replace('\n', ' ').strip()
                          indent = line[:line.find('description:')]
                          updated_lines.append(f'{indent}description: |\n')
                          updated_lines.append(f'{indent}  {clean_text}\n')
                          skip_mode = True
                          continue
                  updated_lines.append(line)
              with open(yaml_path, 'w') as f: f.writelines(updated_lines)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/*.json _data/repo_metadata.yml
          git commit -m "Dashboard: Update stats, authors, blinking status, and metadata" || exit 0
          git push
